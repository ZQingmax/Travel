server:
  port: ${SERVER_PORT:9090}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:db_travel}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

alipay:
  appId: ${ALIPAY_APP_ID:}
  appPrivateKey: ${ALIPAY_APP_PRIVATE_KEY:}
  alipayPublicKey: ${ALIPAY_PUBLIC_KEY:}
  notifyUrl: ${ALIPAY_NOTIFY_URL:}
  returnUrl: ${ALIPAY_RETURN_URL:http://127.0.0.1:5173/front/orders}

fileBaseUrl: ${FILE_BASE_URL:http://localhost:${server.port}}
file:
  storage: ${FILE_STORAGE:local}
  uploadDir: ${FILE_UPLOAD_DIR:${user.dir}/files}
  allowedImageTypes: image/jpeg,image/png,image/gif,image/webp,image/avif
  oss:
    endpoint: ${OSS_ENDPOINT:}
    region: ${OSS_REGION:}
    bucketName: ${OSS_BUCKET_NAME:}
    accessKeyId: ${OSS_ACCESS_KEY_ID:}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET:}
    objectPrefix: ${OSS_OBJECT_PREFIX:images}
    publicBaseUrl: ${OSS_PUBLIC_BASE_URL:}
    signedUrlExpirationSeconds: ${OSS_SIGNED_URL_EXPIRATION_SECONDS:3600}


cors:
  allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
